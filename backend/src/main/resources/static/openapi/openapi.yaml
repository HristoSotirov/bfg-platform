    QualificationEventType:
      $ref: "./competitions/schemas.yaml#/QualificationEventType"
    CompetitionEventStatus:
      $ref: "./competitions/schemas.yaml#/CompetitionEventStatus"
    CompetitionType:
      $ref: "./competitions/schemas.yaml#/CompetitionType"
    ParticipationStatus:
      $ref: "./competitions/schemas.yaml#/ParticipationStatus"
    SeatPosition:

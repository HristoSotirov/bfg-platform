    UserDto:
      $ref: "./users/schemas.yaml#/UserDto"
    UserCreateRequest:
      $ref: "./users/schemas.yaml#/UserCreateRequest"
    UserUpdateRequest:
      $ref: "./users/schemas.yaml#/UserUpdateRequest"
    ClubCoachDto:

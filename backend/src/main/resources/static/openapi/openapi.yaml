openapi: 3.0.3

info:
  title: BFG API
  version: 1.0.0
  description: Bulgarian Rowing Federation platform

servers:
  - url: http://localhost:8080

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and token management
  - name: Clubs
    description: Operations related to rowing clubs
  - name: Athletes
    description: Operations related to athletes
  - name: Users
    description: Operations related to system users
  - name: Club Coaches
    description: Operations related to club coach assignments
  - name: Athlete Photos
    description: Operations related to athlete photo uploads
  - name: Accreditations
    description: Operations related to athlete accreditations

paths:
  /auth/login:
    $ref: "./auth/paths.yaml#/~1auth~1login"
  /auth/refresh:
    $ref: "./auth/paths.yaml#/~1auth~1refresh"
  /auth/logout:
    $ref: "./auth/paths.yaml#/~1auth~1logout"

  /clubs:
    $ref: "./clubs/paths.yaml#/~1clubs"
  /admins/{adminId}/club:
    $ref: "./clubs/paths.yaml#/~1admins~1{adminId}~1club"
  /clubs/migrate:
    $ref: "./clubs/paths.yaml#/~1clubs~1migrate"
  /clubs/{clubUuid}:
    $ref: "./clubs/paths.yaml#/~1clubs~1{clubUuid}"
  /clubs/{clubUuid}/logo:
    $ref: "./clubs/paths.yaml#/~1clubs~1{clubUuid}~1logo"
  /clubs/{clubUuid}/coaches:
    $ref: "./users/paths.yaml#/~1clubs~1{clubUuid}~1coaches"
  /clubs/coaches:
    $ref: "./users/paths.yaml#/~1clubs~1coaches"
  /coaches/{coachId}/club:
    $ref: "./users/paths.yaml#/~1coaches~1{coachId}~1club"
  /clubs/coaches/{clubCoachId}:
    $ref: "./users/paths.yaml#/~1clubs~1coaches~1{clubCoachId}"

  /athletes:
    $ref: "./athletes/paths.yaml#/~1athletes"
  /athletes/batch-medical:
    $ref: "./athletes/paths.yaml#/~1athletes~1batch-medical"
  /athletes/{athleteUuid}:
    $ref: "./athletes/paths.yaml#/~1athletes~1{athleteUuid}"
  /athletes/{athleteUuid}/photos:
    $ref: "./athletes/photo-paths.yaml#/~1athletes~1{athleteUuid}~1photos"
  /athletes/{athleteUuid}/photos/{photoUuid}:
    $ref: "./athletes/photo-paths.yaml#/~1athletes~1{athleteUuid}~1photos~1{photoUuid}"

  /users:
    $ref: "./users/paths.yaml#/~1users"
  /users/{userUuid}:
    $ref: "./users/paths.yaml#/~1users~1{userUuid}"

  /accreditations:
    $ref: "./accreditations/paths.yaml#/~1accreditations"
  /accreditations/migrate:
    $ref: "./accreditations/paths.yaml#/~1accreditations~1migrate"
  /accreditations/renew/batch:
    $ref: "./accreditations/paths.yaml#/~1accreditations~1renew~1batch"
  /accreditations/{accreditationUuid}:
    $ref: "./accreditations/paths.yaml#/~1accreditations~1{accreditationUuid}"

  # Competition definitions & templates
  /competition-group-definitions:
    $ref: "./competitions/paths.yaml#/~1competition-group-definitions"
  /competition-group-definitions/{uuid}:
    $ref: "./competitions/paths.yaml#/~1competition-group-definitions~1{uuid}"
  /discipline-definitions:
    $ref: "./competitions/paths.yaml#/~1discipline-definitions"
  /discipline-definitions/{uuid}:
    $ref: "./competitions/paths.yaml#/~1discipline-definitions~1{uuid}"
  /scoring-schemes:
    $ref: "./competitions/paths.yaml#/~1scoring-schemes"
  /scoring-schemes/{uuid}:
    $ref: "./competitions/paths.yaml#/~1scoring-schemes~1{uuid}"
  /scoring-rules:
    $ref: "./competitions/paths.yaml#/~1scoring-rules"
  /scoring-rules/{uuid}:
    $ref: "./competitions/paths.yaml#/~1scoring-rules~1{uuid}"
  /scoring-scheme-boat-coefficients:
    $ref: "./competitions/paths.yaml#/~1scoring-scheme-boat-coefficients"
  /scoring-scheme-boat-coefficients/{uuid}:
    $ref: "./competitions/paths.yaml#/~1scoring-scheme-boat-coefficients~1{uuid}"
  /competition-templates:
    $ref: "./competitions/paths.yaml#/~1competition-templates"
  /competition-templates/{uuid}:
    $ref: "./competitions/paths.yaml#/~1competition-templates~1{uuid}"
  /competition-template-disciplines:
    $ref: "./competitions/paths.yaml#/~1competition-template-disciplines"
  /competition-template-disciplines/{uuid}:
    $ref: "./competitions/paths.yaml#/~1competition-template-disciplines~1{uuid}"
  /competition-event-timetable-templates:
    $ref: "./competitions/paths.yaml#/~1competition-event-timetable-templates"
  /competition-event-timetable-templates/{uuid}:
    $ref: "./competitions/paths.yaml#/~1competition-event-timetable-templates~1{uuid}"
  /qualification-schemes:
    $ref: "./competitions/paths.yaml#/~1qualification-schemes"
  /qualification-schemes/{uuid}:
    $ref: "./competitions/paths.yaml#/~1qualification-schemes~1{uuid}"
  /qualification-stages:
    $ref: "./competitions/paths.yaml#/~1qualification-stages"
  /qualification-stages/{uuid}:
    $ref: "./competitions/paths.yaml#/~1qualification-stages~1{uuid}"
  /qualification-rules:
    $ref: "./competitions/paths.yaml#/~1qualification-rules"
  /qualification-rules/{uuid}:
    $ref: "./competitions/paths.yaml#/~1qualification-rules~1{uuid}"

components:
  securitySchemes:
    bearerAuth:
      $ref: "./common/security.yaml#/bearerAuth"

  schemas:
    # Auth
    LoginRequest:
      $ref: "./auth/schemas.yaml#/LoginRequest"
    RefreshRequest:
      $ref: "./auth/schemas.yaml#/RefreshRequest"
    TokenResponse:
      $ref: "./auth/schemas.yaml#/TokenResponse"

    # Common
    ScopeType:
      $ref: "./common/schemas.yaml#/ScopeType"
    ErrorResponse:
      $ref: "./common/schemas.yaml#/ErrorResponse"
    Page:
      $ref: "./common/schemas.yaml#/Page"

    # Users
    SystemRole:
      $ref: "./users/schemas.yaml#/SystemRole"
    UserDto:
      $ref: "./users/schemas.yaml#/UserDto"
    UserCreateRequest:
      $ref: "./users/schemas.yaml#/UserCreateRequest"
    UserUpdateRequest:
      $ref: "./users/schemas.yaml#/UserUpdateRequest"
    ClubCoachDto:
      $ref: "./users/schemas.yaml#/ClubCoachDto"
    ClubCoachCreateRequest:
      $ref: "./users/schemas.yaml#/ClubCoachCreateRequest"

    # Clubs
    ClubDto:
      $ref: "./clubs/schemas.yaml#/ClubDto"
    ClubCreateRequest:
      $ref: "./clubs/schemas.yaml#/ClubCreateRequest"
    ClubBatchCreateRequest:
      $ref: "./clubs/schemas.yaml#/ClubBatchCreateRequest"
    ClubBatchCreateRequestItem:
      $ref: "./clubs/schemas.yaml#/ClubBatchCreateRequestItem"
    ClubBatchCreateResponse:
      $ref: "./clubs/schemas.yaml#/ClubBatchCreateResponse"
    ClubUpdateRequest:
      $ref: "./clubs/schemas.yaml#/ClubUpdateRequest"
    ClubLogoUpdateRequest:
      $ref: "./clubs/schemas.yaml#/ClubLogoUpdateRequest"

    # Athletes
    Gender:
      $ref: "./athletes/schemas.yaml#/Gender"
    AthleteDto:
      $ref: "./athletes/schemas.yaml#/AthleteDto"
    AthleteCreateRequest:
      $ref: "./athletes/schemas.yaml#/AthleteCreateRequest"
    AthleteCreateRequestFromAdmin:
      $ref: "./athletes/schemas.yaml#/AthleteCreateRequestFromAdmin"
    AthleteUpdateRequest:
      $ref: "./athletes/schemas.yaml#/AthleteUpdateRequest"
    AthleteBatchMigrationRequest:
      $ref: "./athletes/schemas.yaml#/AthleteBatchMigrationRequest"
    AthleteBatchMigrationRequestItem:
      $ref: "./athletes/schemas.yaml#/AthleteBatchMigrationRequestItem"
    AthleteBatchMigrationResponse:
      $ref: "./athletes/schemas.yaml#/AthleteBatchMigrationResponse"
    AthleteBatchMedicalUpdateRequest:
      $ref: "./athletes/schemas.yaml#/AthleteBatchMedicalUpdateRequest"

    # Athlete Photos
    AthletePhotoDto:
      $ref: "./athletes/photo-schemas.yaml#/AthletePhotoDto"
    AthletePhotoUploadRequest:
      $ref: "./athletes/photo-schemas.yaml#/AthletePhotoUploadRequest"

    # Accreditations
    AccreditationDto:
      $ref: "./accreditations/schemas.yaml#/AccreditationDto"
    AccreditationCreateRequest:
      $ref: "./accreditations/schemas.yaml#/AccreditationCreateRequest"
    AccreditationStatus:
      $ref: "./accreditations/schemas.yaml#/AccreditationStatus"
    AccreditationStatusPatchRequest:
      $ref: "./accreditations/schemas.yaml#/AccreditationStatusPatchRequest"
    AccreditationBatchRenewalRequest:
      $ref: "./accreditations/schemas.yaml#/AccreditationBatchRenewalRequest"
    AccreditationBatchRenewalResponse:
      $ref: "./accreditations/schemas.yaml#/AccreditationBatchRenewalResponse"

    # Competitions - Enums
    CompetitionGroupGender:
      $ref: "./competitions/schemas.yaml#/CompetitionGroupGender"
    TransferRounding:
      $ref: "./competitions/schemas.yaml#/TransferRounding"
    BoatClass:
      $ref: "./competitions/schemas.yaml#/BoatClass"
    ScoringType:
      $ref: "./competitions/schemas.yaml#/ScoringType"
    QualificationEventType:
      $ref: "./competitions/schemas.yaml#/QualificationEventType"
    CompetitionStatus:
      $ref: "./competitions/schemas.yaml#/CompetitionStatus"
    CompetitionEventStatus:
      $ref: "./competitions/schemas.yaml#/CompetitionEventStatus"
    FinishStatus:
      $ref: "./competitions/schemas.yaml#/FinishStatus"
    SeatPosition:
      $ref: "./competitions/schemas.yaml#/SeatPosition"
    WeightMeasurementRole:
      $ref: "./competitions/schemas.yaml#/WeightMeasurementRole"

    # Competitions - DTOs
    CompetitionGroupDefinitionDto:
      $ref: "./competitions/schemas.yaml#/CompetitionGroupDefinitionDto"
    DisciplineDefinitionDto:
      $ref: "./competitions/schemas.yaml#/DisciplineDefinitionDto"
    ScoringSchemeDto:
      $ref: "./competitions/schemas.yaml#/ScoringSchemeDto"
    ScoringRuleDto:
      $ref: "./competitions/schemas.yaml#/ScoringRuleDto"
    CompetitionTemplateDto:
      $ref: "./competitions/schemas.yaml#/CompetitionTemplateDto"
    CompetitionTemplateDisciplineDto:
      $ref: "./competitions/schemas.yaml#/CompetitionTemplateDisciplineDto"
    CompetitionEventTimetableTemplateDto:
      $ref: "./competitions/schemas.yaml#/CompetitionEventTimetableTemplateDto"
    QualificationSchemeDto:
      $ref: "./competitions/schemas.yaml#/QualificationSchemeDto"
    QualificationStageDto:
      $ref: "./competitions/schemas.yaml#/QualificationStageDto"
    QualificationRuleDto:
      $ref: "./competitions/schemas.yaml#/QualificationRuleDto"
    CompetitionDto:
      $ref: "./competitions/schemas.yaml#/CompetitionDto"
    CompetitionDisciplineDto:
      $ref: "./competitions/schemas.yaml#/CompetitionDisciplineDto"
    EntryDto:
      $ref: "./competitions/schemas.yaml#/EntryDto"
    CrewMemberDto:
      $ref: "./competitions/schemas.yaml#/CrewMemberDto"
    CompetitionEventTimetableDto:
      $ref: "./competitions/schemas.yaml#/CompetitionEventTimetableDto"
    CompetitionParticipationDto:
      $ref: "./competitions/schemas.yaml#/CompetitionParticipationDto"
    CompetitionFinalStandingDto:
      $ref: "./competitions/schemas.yaml#/CompetitionFinalStandingDto"
    AthleteWeightMeasurementDto:
      $ref: "./competitions/schemas.yaml#/AthleteWeightMeasurementDto"

    # Competitions - Create/Update Requests
    CompetitionGroupDefinitionRequest:
      $ref: "./competitions/schemas.yaml#/CompetitionGroupDefinitionRequest"
    DisciplineDefinitionRequest:
      $ref: "./competitions/schemas.yaml#/DisciplineDefinitionRequest"
    ScoringSchemeRequest:
      $ref: "./competitions/schemas.yaml#/ScoringSchemeRequest"
    ScoringRuleRequest:
      $ref: "./competitions/schemas.yaml#/ScoringRuleRequest"
    ScoringSchemeBoatCoefficientDto:
      $ref: "./competitions/schemas.yaml#/ScoringSchemeBoatCoefficientDto"
    ScoringSchemeBoatCoefficientRequest:
      $ref: "./competitions/schemas.yaml#/ScoringSchemeBoatCoefficientRequest"
    CompetitionTemplateCreateRequest:
      $ref: "./competitions/schemas.yaml#/CompetitionTemplateCreateRequest"
    CompetitionTemplateUpdateRequest:
      $ref: "./competitions/schemas.yaml#/CompetitionTemplateUpdateRequest"
    CompetitionTemplateDisciplineCreateRequest:
      $ref: "./competitions/schemas.yaml#/CompetitionTemplateDisciplineCreateRequest"
    CompetitionEventTimetableTemplateCreateRequest:
      $ref: "./competitions/schemas.yaml#/CompetitionEventTimetableTemplateCreateRequest"
    CompetitionEventTimetableTemplateUpdateRequest:
      $ref: "./competitions/schemas.yaml#/CompetitionEventTimetableTemplateUpdateRequest"
    QualificationSchemeRequest:
      $ref: "./competitions/schemas.yaml#/QualificationSchemeRequest"
    QualificationStageRequest:
      $ref: "./competitions/schemas.yaml#/QualificationStageRequest"
    QualificationRuleRequest:

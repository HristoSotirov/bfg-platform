# ── Competition Group Definitions ─────────────────────────────────────────────

/competition-group-definitions:
  get:
    tags:
      - Competition Group Definitions
    summary: Get all competition group definitions
    operationId: getAllCompetitionGroupDefinitions
    parameters:
      - name: filter
        in: query
        description: Filter expression (e.g., isActive eq 'true')
        schema:
          type: string
      - name: search
        in: query
        required: false
        description: |
          Free-text search across competition group definition name and short name (case-insensitive).

          **Behavior:**
          - Tokenized by whitespace.
          - All tokens must match at least one field (AND across tokens).

          **Matches:**
          - `name`, `shortName`

          **Examples:**
          - `Men U23`
        schema:
          type: string
      - name: orderBy
        in: query
        description: Predefined ordering (multiselect)
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
              - name_asc
              - name_desc
              - shortName_asc
              - shortName_desc
              - isActive_asc
              - isActive_desc
              - createdAt_asc
              - createdAt_desc
          default: ["name_asc"]
      - name: top
        in: query
        description: Maximum number of items to return
        schema:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100
      - name: skip
        in: query
        description: Number of items to skip
        schema:
          type: integer
          minimum: 0
          default: 0
    responses:
      "200":
        description: List of competition group definitions successfully retrieved
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../common/schemas.yaml#/Page"
                - type: object
                  properties:
                    content:
                      type: array
                      items:
                        $ref: "../competitions/schemas.yaml#/CompetitionGroupDefinitionDto"
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 500
              message: "Internal server error. Please try again later."

  post:
    tags:
      - Competition Group Definitions
    summary: Create a new competition group definition
    operationId: createCompetitionGroupDefinition
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../competitions/schemas.yaml#/CompetitionGroupDefinitionRequest"
    responses:
      "201":
        description: Competition group definition created successfully
        content:
          application/json:
            schema:
              $ref: "../competitions/schemas.yaml#/CompetitionGroupDefinitionDto"
      "400":
        description: Bad request, validation failed
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 400
              message: "Validation failed."

/competition-group-definitions/{uuid}:
  get:
    tags:
      - Competition Group Definitions
    summary: Get competition group definition by UUID
    operationId: getCompetitionGroupDefinitionByUuid
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID of the competition group definition
        schema:
          type: string
          format: uuid
        x-parameter-extra-annotation: '@NotNull'
    responses:
      "200":
        description: Competition group definition details found
        content:
          application/json:
            schema:
              $ref: "../competitions/schemas.yaml#/CompetitionGroupDefinitionDto"
      "404":
        description: Competition group definition not found
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 404
              message: "Competition group definition not found."

  put:
    tags:
      - Competition Group Definitions
    summary: Update competition group definition by UUID
    operationId: updateCompetitionGroupDefinitionByUuid
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID of the competition group definition
        schema:
          type: string
          format: uuid
        x-parameter-extra-annotation: '@NotNull'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../competitions/schemas.yaml#/CompetitionGroupDefinitionRequest"
    responses:
      "200":
        description: Competition group definition updated successfully
        content:
          application/json:
            schema:
              $ref: "../competitions/schemas.yaml#/CompetitionGroupDefinitionDto"
      "400":
        description: Bad request - validation error
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 400
              message: "Invalid data format."
      "404":
        description: Competition group definition not found
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 404
              message: "Competition group definition not found."
      "409":
        description: Conflict - name/shortName already exists
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 409
              message: "Another competition group definition with the same name or short name already exists."

  delete:
    tags:
      - Competition Group Definitions
    summary: Delete competition group definition by UUID
    operationId: deleteCompetitionGroupDefinitionByUuid
    parameters:
      - name: uuid
        in: path
        required: true
        description: UUID of the competition group definition
        schema:
          type: string
          format: uuid
        x-parameter-extra-annotation: '@NotNull'
    responses:
      "204":
        description: Competition group definition deleted successfully (no content)
      "404":
        description: Competition group definition not found
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 404
              message: "Competition group definition not found."
      "409":
        description: Conflict - referenced by other records
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 409
              message: "Cannot delete competition group definition: it is referenced by other records."


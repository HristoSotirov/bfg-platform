/competition-timetable-events/{uuid}/status:
  parameters:
    - name: uuid
      in: path
      required: true
      description: UUID of the competition timetable event
      schema:
        type: string
        format: uuid
      x-parameter-extra-annotation: '@NotNull'

  put:
    tags:
      - Competition Timetable Events
    summary: Update competition timetable event status
    description: |
      Updates the status of a competition timetable event with transition validation.
      Allowed transitions:
      - SCHEDULED → IN_PROGRESS, CANCELLED, POSTPONED
      - IN_PROGRESS → SCHEDULED (if no results), UNOFFICIAL_RESULTS, OFFICIAL_RESULTS, CANCELLED, POSTPONED
      - UNOFFICIAL_RESULTS → OFFICIAL_RESULTS
      - OFFICIAL_RESULTS → UNOFFICIAL_RESULTS
      - CANCELLED → SCHEDULED
      - POSTPONED → SCHEDULED
    operationId: updateCompetitionEventStatus
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../competitions/schemas.yaml#/UpdateEventStatusRequest"
    responses:
      "200":
        description: Event status updated successfully
        content:
          application/json:
            schema:
              $ref: "../competitions/schemas.yaml#/CompetitionTimetableEventDto"
      "404":
        description: Competition timetable event not found
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 404
              message: "Competition timetable event not found."
      "422":
        description: Invalid status transition
        content:
          application/json:
            schema:
              type: object
              properties:
                errors:
                  type: array
                  items:
                    type: string


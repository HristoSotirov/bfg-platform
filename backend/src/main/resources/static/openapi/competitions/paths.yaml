    responses:
      "204":
        description: Qualification progression deleted successfully (no content)
      "404":
        description: Qualification progression not found
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"
            example:
              code: 404
              message: "Qualification progression not found."
      "409":
        description: Conflict - referenced by other records
        content:
          application/json:
            schema:
              $ref: "../common/schemas.yaml#/ErrorResponse"

# ── Enums ──────────────────────────────────────────────────────────────────────

CompetitionType:
  type: string
  description: Type of competition
  enum:
    - INTERNAL_NATIONAL_ERGO
    - INTERNAL_NATIONAL_WATER
    - BALKAN_WATER

CompetitionGroupGender:
  type: string
  description: Gender classification for competition groups
  enum:
    - MALE
    - FEMALE
    - MIXED

TransferRounding:
  type: string
  description: Rounding strategy for crew transfer calculations
  enum:
    - FLOOR
    - CEIL
    - ROUND

CompetitionStageType:
  type: string
  description: Type of competition stage
  enum:
    - INTERNAL_NATIONAL_WATER_ADULT
    - INTERNAL_NATIONAL_WATER_SENIOR
    - INTERNAL_NATIONAL_WATER_JUNIOR
    - INTERNAL_NATIONAL_WATER_ALL
    - INTERNAL_NATIONAL_ERGO_ALL
    - BALKAN_WATER_JUNIOR_SENIOR

QualificationEventType:
  type: string
  description: Type of competition event (heat, repechage, semi-final, final)
  enum:
    - H1
    - H2
    - H3
    - H4
    - SF
    - FB
    - FA

CompetitionStatus:
  type: string
  description: Status of a competition
  enum:
    - DRAFT
    - REGISTRATION_OPEN
    - REGISTRATION_CLOSED
    - IN_PROGRESS
    - COMPLETED
    - CANCELLED

StageStatus:
  type: string
  description: Status of a competition stage
  enum:
    - DRAFT
    - REGISTRATION_OPEN
    - REGISTRATION_CLOSED
    - IN_PROGRESS
    - COMPLETED
    - CANCELLED

CompetitionEventStatus:
  type: string
  description: Status of a competition event
  enum:
    - SCHEDULED
    - IN_PROGRESS
    - FINISHED
    - CANCELLED
    - POSTPONED

FinishStatus:
  type: string
  description: Finish status of a participation
  enum:
    - OK
    - DNS
    - DNF
    - DSQ

SeatPosition:
  type: string
  description: Seat position in a boat
  enum:
    - BOW
    - TWO
    - THREE
    - FOUR
    - FIVE
    - SIX
    - SEVEN
    - STROKE
    - COX

WeightMeasurementRole:
  type: string
  description: Role of the athlete for weight measurement purposes
  enum:
    - ROWER
    - COX

# ── DTOs ──────────────────────────────────────────────────────────────────────

CompetitionGroupDefinitionDto:
  type: object
  description: Data Transfer Object for competition group definition
  properties:
    uuid:
      type: string
      format: uuid
    name:
      type: string
      example: "Men Under 23"
    shortName:
      type: string
      example: "M U23"
    gender:
      $ref: "#/CompetitionGroupGender"
    minAge:
      type: integer
      example: 18
    maxAge:
      type: integer
      example: 22
    competitionType:
      $ref: "#/CompetitionType"
    transferGroupId:
      type: string
      format: uuid
    transferMinCrew:
      type: integer
    transferRatio:
      type: integer
    transferRounding:
      $ref: "#/TransferRounding"
    coxRequiredWeightKg:
      type: number
      format: double
    coxMinWeightKg:
      type: number
      format: double
    lightMaxWeightKg:
      type: number
      format: double
    isActive:
      type: boolean
      example: true
    createdAt:
      type: string
      format: date-time
    modifiedAt:
      type: string
      format: date-time

DisciplineDefinitionDto:
  type: object
  description: Data Transfer Object for discipline definition
  properties:
    uuid:
      type: string
      format: uuid
    name:
      type: string
      example: "Men's Single Sculls"
    shortName:
      type: string
      example: "M1x"
    competitionGroupId:
      type: string
      format: uuid
    boatClass:
      type: string
      example: "1x"
    crewSize:
      type: integer
      example: 1
    hasCoxswain:
      type: boolean
      example: false
    isLightweight:
      type: boolean
      example: false
    distanceMeters:
      type: integer
      example: 2000
    maxTransferCrew:
      type: integer
    scoringMultiplier:
      type: number
      format: double
      example: 1.000
    competitionType:
      $ref: "#/CompetitionType"
    isActive:
      type: boolean
      example: true
    createdAt:
      type: string
      format: date-time
    modifiedAt:
      type: string
      format: date-time


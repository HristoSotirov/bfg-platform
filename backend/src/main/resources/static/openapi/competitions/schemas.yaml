# ── Create/Update Requests ───────────────────────────────────────────────────

CompetitionGroupDefinitionRequest:
  type: object
  description: Request payload for creating or updating a competition group definition
  required:
    - name
    - shortName
    - gender
    - minAge
    - maxAge
    - maxDisciplinesPerAthlete
    - isActive
  properties:
    name:
      type: string
      minLength: 1
      x-field-extra-annotation: '@NotBlank(message = "Name is required")'
    shortName:
      type: string
      minLength: 1
      x-field-extra-annotation: '@NotBlank(message = "Short name is required")'
    gender:
      allOf:
        - $ref: "#/CompetitionGroupGender"
      x-field-extra-annotation: '@NotNull(message = "Gender is required")'
    minAge:
      type: integer
      minimum: 0
      x-field-extra-annotation: |-
        @NotNull(message = "Min age is required")
        @Min(value = 0, message = "Min age must be >= 0")
    maxAge:
      type: integer
      minimum: 0
      x-field-extra-annotation: |-
        @NotNull(message = "Max age is required")
        @Min(value = 0, message = "Max age must be >= 0")
    maxDisciplinesPerAthlete:
      type: integer
      minimum: 1
      x-field-extra-annotation: |-
        @NotNull(message = "Max disciplines per athlete is required")
        @Min(value = 1, message = "Max disciplines per athlete must be >= 1")
    transferFromGroupId:
      type: string
      format: uuid
      description: "Nullable - all transfer fields must be set together or all null"
    minCrewForTransfer:
      type: integer
      minimum: 1
      x-field-extra-annotation: '@Min(value = 1, message = "Min crew for transfer must be >= 1")'
      description: "Nullable - all transfer fields must be set together or all null"
    transferRatio:
      type: integer
      minimum: 1
      maximum: 100
      x-field-extra-annotation: '@Min(value = 1, message = "Transfer ratio must be >= 1")'
      description: "Nullable - all transfer fields must be set together or all null"
    transferRounding:
      $ref: "#/TransferRounding"
      description: "Nullable - all transfer fields must be set together or all null"
    transferredMaxDisciplinesPerPerson:
      type: integer
      minimum: 1
      x-field-extra-annotation: '@Min(value = 1, message = "Transferred max disciplines per person must be >= 1")'
      description: "Nullable - all transfer fields must be set together or all null"
    coxRequiredWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Cox required weight must be positive")'
      description: "Nullable - both cox weight fields must be set together or both null"
    coxMinWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Cox min weight must be positive")'
      description: "Nullable - both cox weight fields must be set together or both null"
    lightMaxWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Light max weight must be positive")'
    isActive:
      type: boolean
      x-field-extra-annotation: '@NotNull(message = "isActive is required")'


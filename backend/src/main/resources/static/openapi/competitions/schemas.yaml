# ── Enums ──────────────────────────────────────────────────────────────────────

DisciplineGender:
  type: string
  description: Gender classification for a discipline
  enum:
    - MALE
    - FEMALE
    - MIXED

TransferRounding:
  type: string
  description: Rounding strategy for crew transfer calculations
  enum:
    - FLOOR
    - CEIL
    - ROUND

QualificationEventType:
  type: string
  description: Type of competition event (heat, semi-final, final)
  enum:
    - H
    - SF
    - FB
    - FA

CompetitionStatus:
  type: string
  description: Status of a competition
  enum:
    - PLANNED
    - REGISTRATION_OPEN
    - REGISTRATION_CLOSED
    - IN_PROGRESS
    - COMPLETED
    - CANCELLED

CompetitionEventStatus:
  type: string
  description: Status of a competition event
  enum:
    - SCHEDULED
    - IN_PROGRESS
    - UNOFFICIAL_RESULTS
    - OFFICIAL_RESULTS
    - CANCELLED

CompetitionType:
  type: string
  description: Type/format of the competition
  enum:
    - ERG
    - NATIONAL_WATER
    - BALKAN

ParticipationStatus:
  type: string
  description: Status of a participation in a competition event
  enum:
    - REGISTERED
    - CHECKED_IN
    - DNS
    - DNF
    - DSQ
    - FINISHED

SeatPosition:
  type: string
  description: Seat position in a boat
  enum:
    - BOW
    - TWO
    - THREE
    - FOUR
    - FIVE
    - SIX
    - SEVEN
    - STROKE
    - COX

WeightMeasurementRole:
  type: string
  description: Role of the athlete for weight measurement purposes
  enum:
    - ROWER
    - COX

BoatClass:
  type: string
  description: Type of rowing boat
  enum:
    - SINGLE_SCULL
    - DOUBLE_SCULL
    - COXED_PAIR
    - PAIR
    - QUAD
    - COXED_QUAD
    - COXED_FOUR
    - FOUR
    - EIGHT
    - ERGO

ScoringType:
  type: string
  description: Type of scoring calculation
  enum:
    - FIXED
    - OFFSET_FROM_END

# ── DTOs ──────────────────────────────────────────────────────────────────────

CompetitionGroupDefinitionDto:
  type: object
  description: Data Transfer Object for competition group definition
  properties:
    uuid:
      type: string
      format: uuid
    name:
      type: string
      example: "Men Under 23"
    shortName:
      type: string
      example: "M U23"
    minAge:
      type: integer
      example: 18
    maxAge:
      type: integer
      example: 22
    coxMinAge:
      type: integer
      description: "Minimum age for coxswain - nullable, falls back to minAge"
    coxMaxAge:
      type: integer
      description: "Maximum age for coxswain - nullable, falls back to maxAge"
    maxDisciplinesPerAthlete:
      type: integer
      example: 3
    transferFromGroupId:
      type: string
      format: uuid
    minCrewForTransfer:
      type: integer
    transferRatio:
      type: integer
    transferRounding:
      $ref: "#/TransferRounding"
    transferredMaxDisciplinesPerAthlete:
      type: integer
    maleTeamCoxRequiredWeightKg:
      type: number
      format: double
    maleTeamCoxMinWeightKg:
      type: number
      format: double
    maleTeamLightMaxWeightKg:
      type: number
      format: double
    femaleTeamCoxRequiredWeightKg:
      type: number
      format: double
    femaleTeamCoxMinWeightKg:
      type: number
      format: double
    femaleTeamLightMaxWeightKg:
      type: number
      format: double
    isActive:
      type: boolean
      example: true
    transferFromGroup:
      $ref: "#/CompetitionGroupDefinitionDto"
    createdAt:
      type: string
      format: date-time
    modifiedAt:
      type: string
      format: date-time


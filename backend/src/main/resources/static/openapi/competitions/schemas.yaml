# ── Enums ──────────────────────────────────────────────────────────────────────

CompetitionGroupGender:
  type: string
  description: Gender classification for competition groups
  enum:
    - MALE
    - FEMALE
    - MIXED

TransferRounding:
  type: string
  description: Rounding strategy for crew transfer calculations
  enum:
    - FLOOR
    - CEIL
    - ROUND

QualificationEventType:
  type: string
  description: Type of competition event (heat, semi-final, final)
  enum:
    - H
    - SF
    - FB
    - FA

CompetitionStatus:
  type: string
  description: Status of a competition
  enum:
    - DRAFT
    - REGISTRATION_OPEN
    - REGISTRATION_CLOSED
    - IN_PROGRESS
    - COMPLETED
    - CANCELLED

CompetitionEventStatus:
  type: string
  description: Status of a competition event
  enum:
    - SCHEDULED
    - IN_PROGRESS
    - FINISHED
    - CANCELLED
    - POSTPONED

FinishStatus:
  type: string
  description: Finish status of a participation
  enum:
    - OK
    - DNS
    - DNF
    - DSQ

SeatPosition:
  type: string
  description: Seat position in a boat
  enum:
    - BOW
    - TWO
    - THREE
    - FOUR
    - FIVE
    - SIX
    - SEVEN
    - STROKE
    - COX

WeightMeasurementRole:
  type: string
  description: Role of the athlete for weight measurement purposes
  enum:
    - ROWER
    - COX

BoatClass:
  type: string
  description: Type of rowing boat
  enum:
    - 1X
    - 2X
    - 2+
    - 2-
    - 4X
    - 4X+
    - 4+
    - 4-
    - 8+
    - ERGO

ScoringType:
  type: string
  description: Type of scoring calculation
  enum:
    - FIXED
    - OFFSET_FROM_END


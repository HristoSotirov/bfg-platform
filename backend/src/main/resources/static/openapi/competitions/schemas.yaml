      x-field-extra-annotation: '@NotNull(message = "Role is required")'

# ── Create/Update Requests ───────────────────────────────────────────────────

CompetitionGroupDefinitionRequest:
  type: object
  description: Request payload for creating or updating a competition group definition
  required:
    - name
    - shortName
    - minAge
    - maxAge
    - maxDisciplinesPerAthlete
    - isActive
  properties:
    name:
      type: string
      minLength: 1
      x-field-extra-annotation: '@NotBlank(message = "Name is required")'
    shortName:
      type: string
      minLength: 1
      x-field-extra-annotation: '@NotBlank(message = "Short name is required")'
    minAge:
      type: integer
      minimum: 0
      x-field-extra-annotation: |-
        @NotNull(message = "Min age is required")
        @Min(value = 0, message = "Min age must be >= 0")
    maxAge:
      type: integer
      minimum: 0
      x-field-extra-annotation: |-
        @NotNull(message = "Max age is required")
        @Min(value = 0, message = "Max age must be >= 0")
    coxMinAge:
      type: integer
      minimum: 0
      x-field-extra-annotation: '@Min(value = 0, message = "Cox min age must be >= 0")'
      description: "Nullable - minimum age for coxswain, falls back to minAge if null"
    coxMaxAge:
      type: integer
      minimum: 0
      x-field-extra-annotation: '@Min(value = 0, message = "Cox max age must be >= 0")'
      description: "Nullable - maximum age for coxswain, falls back to maxAge if null"
    maxDisciplinesPerAthlete:
      type: integer
      minimum: 1
      x-field-extra-annotation: |-
        @NotNull(message = "Max disciplines per athlete is required")
        @Min(value = 1, message = "Max disciplines per athlete must be >= 1")
    transferFromGroupId:
      type: string
      format: uuid
      description: "Nullable - all transfer fields must be set together or all null"
    minCrewForTransfer:
      type: integer
      minimum: 1
      x-field-extra-annotation: '@Min(value = 1, message = "Min crew for transfer must be >= 1")'
      description: "Nullable - all transfer fields must be set together or all null"
    transferRatio:
      type: integer
      minimum: 1
      maximum: 100
      x-field-extra-annotation: '@Min(value = 1, message = "Transfer ratio must be >= 1")'
      description: "Nullable - all transfer fields must be set together or all null"
    transferRounding:
      $ref: "#/TransferRounding"
      description: "Nullable - all transfer fields must be set together or all null"
    transferredMaxDisciplinesPerAthlete:
      type: integer
      minimum: 1
      x-field-extra-annotation: '@Min(value = 1, message = "Transferred max disciplines per person must be >= 1")'
      description: "Nullable - all transfer fields must be set together or all null"
    maleTeamCoxRequiredWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Male team cox required weight must be positive")'
      description: "Nullable - both male team cox weight fields must be set together or both null"
    maleTeamCoxMinWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Male team cox min weight must be positive")'
      description: "Nullable - both male team cox weight fields must be set together or both null"
    maleTeamLightMaxWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Male team light max weight must be positive")'
    femaleTeamCoxRequiredWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Female team cox required weight must be positive")'
      description: "Nullable - both female team cox weight fields must be set together or both null"
    femaleTeamCoxMinWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Female team cox min weight must be positive")'
      description: "Nullable - both female team cox weight fields must be set together or both null"
    femaleTeamLightMaxWeightKg:
      type: number
      format: double
      x-field-extra-annotation: '@DecimalMin(value = "0.0", inclusive = false, message = "Female team light max weight must be positive")'
    isActive:
      type: boolean
      x-field-extra-annotation: '@NotNull(message = "isActive is required")'


databaseChangeLog:
  - changeSet:
      id: 001-athletes-gender-uppercase
      author: bfg
      comment: Normalize athletes.gender to uppercase enum values (MALE, FEMALE) for @Enumerated(EnumType.STRING)
      changes:
        - update:
            tableName: athletes
            columns:
              - column:
                  name: gender
                  value: MALE
            where: gender = 'male'
        - update:
            tableName: athletes
            columns:
              - column:
                  name: gender
                  value: FEMALE
            where: gender = 'female'

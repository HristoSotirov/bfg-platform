databaseChangeLog:
  - changeSet:
      id: 015-qualification-schemes
      author: bfg
      changes:
        - createTable:
            tableName: qualification_schemes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: competition_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: competition_stage_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: lane_count
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: qualification_schemes
            columnNames: competition_type, competition_stage_type, lane_count
            constraintName: uq_qual_scheme_type_stage_lanes

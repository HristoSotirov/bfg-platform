databaseChangeLog:
  - changeSet:
      id: 012-competition-scoring-formulas
      author: bfg
      changes:
        - createTable:
            tableName: competition_scoring_formulas
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: competition_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: placement
                  type: INTEGER
              - column:
                  name: base_points
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP

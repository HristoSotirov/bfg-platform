databaseChangeLog:
  - changeSet:
      id: 020-crew-members
      author: bfg
      changes:
        - createTable:
            tableName: crew_members
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: entry_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: seat_position
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "BOW, 2..7, STROKE, COX"
              - column:
                  name: accreditation_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: crew_members
            columnNames: entry_id, seat_position
            constraintName: uq_crew_entry_seat
        - addUniqueConstraint:
            tableName: crew_members
            columnNames: entry_id, accreditation_id
            constraintName: uq_crew_entry_accreditation
        - addForeignKeyConstraint:
            baseTableName: crew_members
            baseColumnNames: entry_id
            referencedTableName: entries
            referencedColumnNames: id
            constraintName: fk_crew_entry
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: crew_members
            baseColumnNames: accreditation_id
            referencedTableName: accreditations
            referencedColumnNames: id
            constraintName: fk_crew_accreditation
            onDelete: RESTRICT

databaseChangeLog:
  - changeSet:
      id: 017-competition-events-timetable-templates
      author: bfg
      changes:
        - createTable:
            tableName: competition_events_timetable_templates
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: competition_template_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_number
                  type: INTEGER
                  constraints:
                    nullable: false
                  remarks: "Overall event order for the day (1 to N)"
              - column:
                  name: discipline_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: qualification_event_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "H, SF, FB, FA"
              - column:
                  name: qualification_stage_number
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValueNumeric: 1
                  remarks: "Which heat/SF (1, 2, 3, 4). Always 1 for FA/FB."
              - column:
                  name: day_offset
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: planned_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: competition_events_timetable_templates
            columnNames: competition_template_id, discipline_code, qualification_event_type, qualification_stage_number
            constraintName: uq_event_timetable_template
        - addForeignKeyConstraint:
            baseTableName: competition_events_timetable_templates
            baseColumnNames: competition_template_id
            referencedTableName: competition_templates
            referencedColumnNames: id
            constraintName: fk_event_tt_template
            onDelete: RESTRICT

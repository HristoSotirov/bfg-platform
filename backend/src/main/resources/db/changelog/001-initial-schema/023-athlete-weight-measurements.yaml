databaseChangeLog:
  - changeSet:
      id: 023-athlete-weight-measurements
      author: bfg
      changes:
        - createTable:
            tableName: athlete_weight_measurements
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: athlete_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: weight_kg
                  type: NUMERIC(5,2)
                  constraints:
                    nullable: false
                  remarks: "Measured weight of the athlete"
              - column:
                  name: measurement_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "ROWER or COX"
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: athlete_weight_measurements
            columnNames: athlete_id, measurement_date
            constraintName: uq_athlete_weight_date
        - addForeignKeyConstraint:
            baseTableName: athlete_weight_measurements
            baseColumnNames: athlete_id
            referencedTableName: athletes
            referencedColumnNames: id
            constraintName: fk_athlete_weight_athlete
            onDelete: CASCADE
        - sql:
            sql: |
              ALTER TABLE athlete_weight_measurements
                ADD CONSTRAINT chk_athlete_weight_positive CHECK (weight_kg > 0),
                ADD CONSTRAINT chk_athlete_weight_role CHECK (role IN ('ROWER', 'COX'));

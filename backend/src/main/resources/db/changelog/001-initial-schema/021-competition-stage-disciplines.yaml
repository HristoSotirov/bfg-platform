databaseChangeLog:
  - changeSet:
      id: 021-competition-stage-disciplines
      author: bfg
      changes:
        - createTable:
            tableName: competition_stage_disciplines
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: stage_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: discipline_id
                  type: UUID
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: competition_stage_disciplines
            columnNames: stage_id, discipline_id
            constraintName: uq_stage_discipline
        - addForeignKeyConstraint:
            baseTableName: competition_stage_disciplines
            baseColumnNames: stage_id
            referencedTableName: competition_stages
            referencedColumnNames: id
            constraintName: fk_stage_disciplines_stage
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: competition_stage_disciplines
            baseColumnNames: discipline_id
            referencedTableName: discipline_definitions
            referencedColumnNames: id
            constraintName: fk_stage_disciplines_discipline
            onDelete: RESTRICT

databaseChangeLog:
  - changeSet:
      id: 017-competition-stages
      author: bfg
      changes:
        - createTable:
            tableName: competition_stages
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: competition_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: stage_order
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: submission_start
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: submission_end
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: tech_meeting_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: changes_deadline_hours
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: competition_group_codes
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: discipline_codes
                  type: JSONB
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: competition_stages
            columnNames: competition_id, stage_order
            constraintName: uq_comp_stage_order
        - addForeignKeyConstraint:
            baseTableName: competition_stages
            baseColumnNames: competition_id
            referencedTableName: competitions
            referencedColumnNames: id
            constraintName: fk_comp_stage_competition
            onDelete: CASCADE

databaseChangeLog:
  - changeSet:
      id: 016-competition-template-disciplines
      author: bfg
      changes:
        - createTable:
            tableName: competition_template_disciplines
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: competition_template_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: discipline_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: competition_template_disciplines
            columnNames: competition_template_id, discipline_id
            constraintName: uq_comp_template_discipline
        - addForeignKeyConstraint:
            baseTableName: competition_template_disciplines
            baseColumnNames: competition_template_id
            referencedTableName: competition_templates
            referencedColumnNames: id
            constraintName: fk_comp_tmpl_disc_template
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: competition_template_disciplines
            baseColumnNames: discipline_id
            referencedTableName: discipline_definitions
            referencedColumnNames: id
            constraintName: fk_comp_tmpl_disc_discipline
            onDelete: RESTRICT

databaseChangeLog:
  - changeSet:
      id: 015-competition-templates
      author: bfg
      changes:
        - createTable:
            tableName: competition_templates
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: short_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: duration_days
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: scoring_scheme_id
                  type: UUID
              - column:
                  name: qualification_scheme_id
                  type: UUID
              - column:
                  name: is_active
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: competition_templates
            baseColumnNames: scoring_scheme_id
            referencedTableName: scoring_schemes
            referencedColumnNames: id
            constraintName: fk_comp_template_scoring_scheme
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: competition_templates
            baseColumnNames: qualification_scheme_id
            referencedTableName: qualification_schemes
            referencedColumnNames: id
            constraintName: fk_comp_template_qual_scheme
            onDelete: RESTRICT

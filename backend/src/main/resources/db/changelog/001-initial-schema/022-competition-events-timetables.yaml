databaseChangeLog:
  - changeSet:
      id: 022-competition-events-timetables
      author: bfg
      changes:
        - createTable:
            tableName: competition_events_timetables
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: competition_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: event_number
                  type: INTEGER
                  constraints:
                    nullable: false
                  remarks: "Overall event order for the day (1 to N)"
              - column:
                  name: discipline_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: qualification_event_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "H, SF, FB, FA"
              - column:
                  name: qualification_stage_number
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValueNumeric: 1
                  remarks: "Which heat/SF (1, 2, 3, 4). Always 1 for FA/FB."
              - column:
                  name: scheduled_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMPTZ
              - column:
                  name: competition_event_status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "SCHEDULED, IN_PROGRESS, FINISHED, CANCELLED, POSTPONED"
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: competition_events_timetables
            columnNames: competition_id, discipline_id, qualification_event_type, qualification_stage_number
            constraintName: uq_event_tt_comp_disc_type_num
        - addForeignKeyConstraint:
            baseTableName: competition_events_timetables
            baseColumnNames: competition_id
            referencedTableName: competitions
            referencedColumnNames: id
            constraintName: fk_event_tt_competition
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: competition_events_timetables
            baseColumnNames: discipline_id
            referencedTableName: discipline_definitions
            referencedColumnNames: id
            constraintName: fk_event_tt_discipline
            onDelete: RESTRICT

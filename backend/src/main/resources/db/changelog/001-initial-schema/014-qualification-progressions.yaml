databaseChangeLog:
  - changeSet:
      id: 014-qualification-progressions
      author: bfg
      changes:
        - createTable:
            tableName: qualification_progressions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: qualification_tier_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: source_event
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: dest_event
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: qualify_by_position
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: qualify_by_time
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: qualification_progressions
            columnNames: qualification_tier_id, source_event, dest_event
            constraintName: uq_qual_progression_tier_src_dest
        - addForeignKeyConstraint:
            baseTableName: qualification_progressions
            baseColumnNames: qualification_tier_id
            referencedTableName: qualification_tiers
            referencedColumnNames: id
            constraintName: fk_qual_progression_tier
            onDelete: RESTRICT

databaseChangeLog:
  - changeSet:
      id: 018-competitions
      author: bfg
      changes:
        - createTable:
            tableName: competitions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: short_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: season
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: scope_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "INTERNAL, EXTERNAL, NATIONAL"
              - column:
                  name: scoring_scheme_id
                  type: UUID
              - column:
                  name: qualification_scheme_id
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: competitions
            baseColumnNames: scoring_scheme_id
            referencedTableName: scoring_schemes
            referencedColumnNames: id
            constraintName: fk_competition_scoring_scheme
            onDelete: RESTRICT
        - addForeignKeyConstraint:
            baseTableName: competitions
            baseColumnNames: qualification_scheme_id
            referencedTableName: qualification_schemes
            referencedColumnNames: id
            constraintName: fk_competition_qual_scheme
            onDelete: RESTRICT

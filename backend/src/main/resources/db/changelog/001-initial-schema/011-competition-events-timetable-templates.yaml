databaseChangeLog:
  - changeSet:
      id: 011-competition-events-timetable-templates
      author: bfg
      changes:
        - createTable:
            tableName: competition_events_timetable_templates
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: template_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: stage_template_id
                  type: UUID
              - column:
                  name: discipline_code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: competition_event_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  remarks: "H1, H2, R, SF, FB, FA"
              - column:
                  name: day_offset
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: planned_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: modified_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: competition_events_timetable_templates
            columnNames: template_id, stage_template_id, discipline_code, competition_event_type
            constraintName: uq_event_timetable_template
        - addForeignKeyConstraint:
            baseTableName: competition_events_timetable_templates
            baseColumnNames: template_id
            referencedTableName: competition_templates
            referencedColumnNames: id
            constraintName: fk_event_tt_template
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: competition_events_timetable_templates
            baseColumnNames: stage_template_id
            referencedTableName: competition_stage_templates
            referencedColumnNames: id
            constraintName: fk_event_tt_stage_template
            onDelete: CASCADE

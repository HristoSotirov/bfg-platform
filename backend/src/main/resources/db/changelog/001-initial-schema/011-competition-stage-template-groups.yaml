databaseChangeLog:
  - changeSet:
      id: 011-competition-stage-template-groups
      author: bfg
      changes:
        - createTable:
            tableName: competition_stage_template_groups
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
                  defaultValueComputed: gen_random_uuid()
              - column:
                  name: stage_template_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: competition_group_id
                  type: UUID
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: competition_stage_template_groups
            columnNames: stage_template_id, competition_group_id
            constraintName: uq_stage_tmpl_group
        - addForeignKeyConstraint:
            baseTableName: competition_stage_template_groups
            baseColumnNames: stage_template_id
            referencedTableName: competition_stage_templates
            referencedColumnNames: id
            constraintName: fk_stage_tmpl_groups_stage_tmpl
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: competition_stage_template_groups
            baseColumnNames: competition_group_id
            referencedTableName: competition_group_definitions
            referencedColumnNames: id
            constraintName: fk_stage_tmpl_groups_group
            onDelete: CASCADE

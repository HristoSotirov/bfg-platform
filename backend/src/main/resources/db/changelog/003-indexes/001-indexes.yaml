databaseChangeLog:
  - changeSet:
      id: 003-001-indexes
      author: bfg
      comment: Indexes for all tables - FKs, status/filter columns, and search columns
      changes:

        # =============================================
        # users
        # =============================================
        # username has UNIQUE → already indexed
        - createIndex:
            tableName: users
            indexName: idx_users_role
            columns:
              - column: { name: role }
        - createIndex:
            tableName: users
            indexName: idx_users_scope_type
            columns:
              - column: { name: scope_type }
        - createIndex:
            tableName: users
            indexName: idx_users_is_active
            columns:
              - column: { name: is_active }
        - createIndex:
            tableName: users
            indexName: idx_users_email
            columns:
              - column: { name: email }

        # =============================================
        # clubs
        # =============================================
        # club_admin, club_email, name, short_name, card_prefix have UNIQUE → already indexed

databaseChangeLog:
  - changeSet:
      id: 002-apply-timestamp-triggers
      author: bfg
      changes:
        # Users table triggers
        - sql:
            sql: |
              CREATE TRIGGER set_users_modified_at
                BEFORE INSERT OR UPDATE ON users
                FOR EACH ROW
                EXECUTE FUNCTION set_modified_at();


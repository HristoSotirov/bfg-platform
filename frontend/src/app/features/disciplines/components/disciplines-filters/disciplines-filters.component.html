<div class="bg-white rounded-lg p-4 mb-4">
  <div class="flex flex-col sm:flex-row sm:flex-wrap sm:items-end gap-4">
    <div class="w-full sm:flex-1 sm:min-w-[180px] sm:max-w-[180px]">
      <app-search-bar
        [searchValue]="searchValue"
        (searchValueChange)="onSearchChange($event)"
        [placeholder]="'common.search' | translate"
        [showIcon]="true"
        [showClearButton]="false"
        inputClasses="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
      ></app-search-bar>
    </div>

    @if (isFilterVisible("competitionGroup")) {
      <div
        [class.hidden]="!filtersExpanded"
        class="sm:block w-full sm:w-[220px]"
      >
        <label class="block text-xs font-medium text-gray-500 mb-1">{{ 'disciplines.filters.competitionGroupLabel' | translate }}</label>
        <app-multi-select-dropdown
          [options]="groupOptions"
          [multiple]="true"
          [placeholder]="'disciplines.filters.competitionGroupAll' | translate"
          [ngModel]="filters.competitionGroupIds || []"
          (selectionChange)="onGroupsChange($event)"
        >
        </app-multi-select-dropdown>
      </div>
    }

    @if (hasVisibleFilters() && isFilterVisible("boatClass")) {
      <div
        [class.hidden]="!filtersExpanded"
        class="sm:block w-full sm:w-[180px]"
      >
        <label class="block text-xs font-medium text-gray-500 mb-1"
          >{{ 'disciplines.filters.boatClassLabel' | translate }}</label
        >
        <app-multi-select-dropdown
          [options]="boatClassOptions"
          [multiple]="true"
          [placeholder]="'disciplines.filters.boatClassAll' | translate"
          [ngModel]="filters.boatClasses || []"
          (selectionChange)="onBoatClassesChange($event)"
        >
        </app-multi-select-dropdown>
      </div>
    }

    @if (hasVisibleFilters() && isFilterVisible("status")) {
      <div
        [class.hidden]="!filtersExpanded"
        class="sm:block w-full sm:w-[180px]"
      >
        <label class="block text-xs font-medium text-gray-500 mb-1"
          >{{ 'disciplines.filters.statusLabel' | translate }}</label
        >
        <app-multi-select-dropdown
          [options]="statusOptions"
          [multiple]="true"
          [placeholder]="'disciplines.filters.statusAll' | translate"
          [ngModel]="filters.statuses || []"
          (selectionChange)="onStatusesChange($event)"
        >
        </app-multi-select-dropdown>
      </div>
    }
  </div>

  <app-filter-toggle-button
    [expanded]="filtersExpanded"
    [visible]="hasVisibleFilters()"
    (toggleChange)="filtersExpanded = $event"
  ></app-filter-toggle-button>
</div>

<app-dialog [isOpen]="isOpen" [title]="'disciplines.form.title' | translate" (closed)="close()">
  <div class="flex flex-col h-full min-h-0">
  <div class="space-y-4 flex-1 min-h-0 overflow-y-auto">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.nameLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="text"
        [(ngModel)]="formData.name"
        [placeholder]="'disciplines.form.namePlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
        [class.border-red-500]="touched['name'] && !formData.name.trim()"
        (blur)="touched['name'] = true">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.shortNameLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="text"
        [(ngModel)]="formData.shortName"
        [placeholder]="'disciplines.form.shortNamePlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
        [class.border-red-500]="touched['shortName'] && !formData.shortName.trim()"
        (blur)="touched['shortName'] = true">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.genderLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="genderOptions"
        [placeholder]="'disciplines.placeholders.selectGender' | translate"
        [ngModel]="formData.gender"
        (ngModelChange)="onGenderChange($event)"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.competitionGroupLabel' | translate }} <span class="text-red-500">*</span>:</label>
      @if (defaultGroupId) {
        <p class="text-sm text-gray-900 px-3 py-2 bg-gray-50 border border-gray-200 rounded-lg">{{ defaultGroupName || defaultGroupId }}</p>
      } @else {
        <app-searchable-select-dropdown
          [staticSearch]="groupSearch"
          [placeholder]="'disciplines.placeholders.selectGroup' | translate"
          [ngModel]="formData.competitionGroupId"
          (ngModelChange)="onCompetitionGroupChange($event)"
          [disabled]="saving">
        </app-searchable-select-dropdown>
      }
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.boatClassLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="boatClassOptions"
        [placeholder]="'disciplines.placeholders.selectBoatClass' | translate"
        [ngModel]="formData.boatClass"
        (ngModelChange)="onBoatClassChange($event)"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.maxCrewFromTransferLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="number"
        [(ngModel)]="formData.maxCrewFromTransfer"
        min="0"
        [placeholder]="'disciplines.form.maxCrewFromTransferPlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.isLightweightLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="booleanOptions"
        [placeholder]="'disciplines.placeholders.select' | translate"
        [ngModel]="formData.isLightweight"
        (ngModelChange)="onIsLightweightChange($event)"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.distanceLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="number"
        [(ngModel)]="formData.distanceMeters"
        min="0"
        [placeholder]="'disciplines.form.distancePlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
        [class.border-red-500]="touched['distanceMeters'] && !formData.distanceMeters && formData.distanceMeters !== 0"
        (blur)="touched['distanceMeters'] = true">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.maxBoatsLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="number"
        [(ngModel)]="formData.maxBoatsPerClub"
        min="1"
        [placeholder]="'disciplines.form.maxBoatsPlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'disciplines.form.statusLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="statusOptions"
        [placeholder]="'disciplines.placeholders.selectStatus' | translate"
        [ngModel]="formData.isActive ? 'true' : 'false'"
        (ngModelChange)="onStatusChange($event)"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>

  </div>
  <div class="bg-white flex flex-col gap-2 pt-4 border-t border-gray-200">
      @if (error) {
        <div class="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg flex items-start justify-between gap-2">
          <p class="text-sm text-red-700">{{ error }}</p>
          <button type="button" class="text-red-400 hover:text-red-600 flex-shrink-0" (click)="error = null">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      }
      <div class="flex justify-center gap-3">
        <app-button
          variant="outline"
          size="md"
          [text]="'common.close' | translate"
          [disabled]="saving"
          (click)="close()">
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [text]="'common.save' | translate"
          [disabled]="!isFormValid || saving"
          (click)="save()">
        </app-button>
      </div>
    </div>
  </div>
</app-dialog>

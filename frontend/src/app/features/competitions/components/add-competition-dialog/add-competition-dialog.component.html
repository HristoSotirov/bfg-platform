<app-dialog [isOpen]="isOpen" title="Добавяне на състезание" size="lg" (closed)="close()">
  <div class="flex flex-col h-full min-h-0">
  <div class="space-y-3 flex-1 min-h-0 overflow-y-auto">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Тип <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="isTemplateOptions"
        [ngModel]="isTemplate ? 'true' : 'false'"
        (ngModelChange)="onIsTemplateChange($event)"
        placeholder="Изберете тип..."
      ></app-searchable-select-dropdown>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Кратко име <span class="text-red-500">*</span>:</label>
        <input
          type="text"
          [(ngModel)]="formData.shortName"
          placeholder="Кратко наименование"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Пълно ime <span class="text-red-500">*</span>:</label>
        <input
          type="text"
          [(ngModel)]="formData.name"
          placeholder="Пълно наименование"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
        />
      </div>
    </div>

    @if (isTemplate) {
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Продължителност (дни) <span class="text-red-500">*</span>:</label>
        <input
          type="number"
          [(ngModel)]="formData.durationDays"
          min="1"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
        />
      </div>
    } @else {
      <div class="flex items-center gap-2">
        <button
          type="button"
          class="text-sm text-bfg-blue hover:underline"
          (click)="showTemplatePicker = !showTemplatePicker"
        >
          Използвай шаблон
        </button>
        @if (selectedTemplateId) {
          <span class="text-xs text-gray-500">{{ selectedTemplateName }}</span>
          <button
            type="button"
            class="text-xs text-red-400 hover:text-red-600"
            (click)="clearTemplate()"
          >✕</button>
        }
      </div>
      @if (showTemplatePicker) {
        <app-searchable-select-dropdown
          [options]="templateOptions"
          [ngModel]="selectedTemplateId"
          (selectionChange)="onUseTemplate($event)"
          placeholder="Изберете шаблон..."
        ></app-searchable-select-dropdown>
      }

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Начална дата <span class="text-red-500">*</span>:</label>
          <input
            type="date"
            [(ngModel)]="formData.startDate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Крайна дата <span class="text-red-500">*</span>:</label>
          <input
            type="date"
            [(ngModel)]="formData.endDate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
          />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Сезон <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.season"
            min="2000"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Място <span class="text-red-500">*</span>:</label>
          <input
            type="text"
            [(ngModel)]="formData.location"
            placeholder="Гр., обект"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
          />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Статус <span class="text-red-500">*</span>:</label>
          <app-searchable-select-dropdown
            [options]="statusOptions"
            [(ngModel)]="formData.status"
            placeholder="Изберете статус..."
          ></app-searchable-select-dropdown>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Обхват <span class="text-red-500">*</span>:</label>
          <app-searchable-select-dropdown
            [options]="scopeTypeOptions"
            [(ngModel)]="formData.scopeType"
            placeholder="Изберете обхват..."
          ></app-searchable-select-dropdown>
        </div>
      </div>
    }

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Схема за точкуване <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="scoringSchemeOptions"
        [(ngModel)]="formData.scoringSchemeId"
        placeholder="Изберете схема..."
      ></app-searchable-select-dropdown>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Квалификационна схема <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="qualificationSchemeOptions"
        [(ngModel)]="formData.qualificationSchemeId"
        placeholder="Изберете схема..."
      ></app-searchable-select-dropdown>
    </div>

  </div>
  <div class="bg-white flex flex-col gap-2 pt-4 border-t border-gray-200">
      @if (error) {
        <div class="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg flex items-start justify-between gap-2">
          <p class="text-sm text-red-700">{{ error }}</p>
          <button type="button" class="text-red-400 hover:text-red-600 flex-shrink-0" (click)="error = null">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      }
      @if (copyPartialError) {
        <div class="w-full px-3 py-2 bg-yellow-50 border border-yellow-200 rounded-lg">
          <p class="text-sm text-yellow-800">{{ copyPartialError }}</p>
        </div>
      }
      <div class="flex justify-center gap-3">
        <app-button variant="outline" size="md" text="Затвори" [disabled]="saving" (click)="close()"></app-button>
        @if (!copyPartialError) {
          <app-button variant="primary" size="md" text="Запази" [disabled]="!isFormValid || saving" (click)="save()"></app-button>
        }
      </div>
    </div>
  </div>
</app-dialog>

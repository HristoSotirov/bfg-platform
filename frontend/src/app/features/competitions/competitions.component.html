<div class="h-screen flex flex-col overflow-hidden bg-white">
  <app-header></app-header>

  <div class="flex-1 flex flex-col overflow-hidden px-4 lg:px-8 py-4">
    <div class="flex items-center gap-3 mb-4">
      <a
        routerLink="/"
        class="p-2 hover:bg-gray-100 rounded-lg transition-colors"
      >
        <svg
          class="w-5 h-5 text-gray-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </a>
      <h1 class="text-2xl font-bold text-gray-900">{{ 'competitions.page.title' | translate }}</h1>
    </div>

    <app-competitions-filters
      [filters]="filters"
      [filterConfigs]="filterConfigs"
      (filtersChange)="onFiltersChange($event)"
      (searchChange)="onSearchChange($event)"
    >
    </app-competitions-filters>

    <div class="flex items-center justify-between gap-4 mb-4">
      <div class="text-sm text-gray-600 flex-shrink-0">
        {{ 'competitions.page.count' | translate }} <span class="font-semibold">{{ totalElements }}</span>
      </div>

      <div class="flex items-center gap-2 ml-auto">
        @if (canAdd) {
          <app-button
            variant="white"
            size="md"
            [text]="'competitions.page.addButton' | translate"
            (click)="openAddDialog()"
          >
          </app-button>
        }
        <button
          type="button"
          class="p-2 hover:bg-gray-100 rounded-lg transition-colors text-gray-600"
          title="{{ 'competitions.page.settingsTitle' | translate }}"
          (click)="openSettingsDialog()"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
            </path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0"></path>
          </svg>
        </button>
      </div>
    </div>

    <div
      class="flex-1 overflow-auto bg-white rounded-lg border border-gray-200"
    >
      @if (loading && competitions.length === 0) {
        <div class="flex items-center justify-center h-full">
          <div class="text-gray-500">{{ 'competitions.page.loading' | translate }}</div>
        </div>
      } @else if (error) {
        <div class="flex items-center justify-center h-full">
          <div class="text-red-500">{{ error }}</div>
        </div>
      } @else {
        <app-competitions-table
          [competitions]="competitions"
          [columns]="columns"
          [loading]="loading"
          [hasMore]="hasMore"
          [orderBy]="orderBy"
          (rowClick)="openDetailsPage($event)"
          (sortChange)="onSortChange($event)"
          (loadMore)="loadMore()"
        >
        </app-competitions-table>
      }
    </div>
  </div>
</div>

<app-add-competition-dialog
  [isOpen]="isAddDialogOpen"
  (closed)="closeAddDialog()"
  (added)="onCompetitionAdded()"
>
</app-add-competition-dialog>

<app-competition-settings-dialog
  [isOpen]="isSettingsDialogOpen"
  [columns]="columns"
  [filterConfigs]="filterConfigs"
  (closed)="closeSettingsDialog()"
  (settingsChange)="onSettingsChange($event)"
>
</app-competition-settings-dialog>

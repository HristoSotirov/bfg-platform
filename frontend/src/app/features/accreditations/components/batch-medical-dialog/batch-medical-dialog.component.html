<app-dialog [isOpen]="isOpen" title="Групова промяна на мед. данни и застраховка" [noScroll]="true" (closed)="close()">
  <div class="space-y-4">
    <p class="text-sm text-gray-600">
      Избрани <span class="font-semibold">{{ uniqueCount }}</span> уникални състезател(и) (по един от всяка избрана акредитация).
    </p>
    <p class="text-xs text-gray-500 italic">
      Можете да попълните или застраховка, или медицински преглед, или и двете. Всяка двойка трябва да бъде попълнена изцяло.
    </p>
    <div class="grid grid-cols-1 gap-4">
      
      <div class="space-y-2 pb-2 border-b border-gray-200">
        <h3 class="text-sm font-semibold text-gray-700">Медицински преглед (опционално)</h3>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Начална дата
            @if (isMedicalStartDateRequired) {
              <span class="text-red-600">*</span>
            }
          </label>
          <app-date-picker
            label=""
            placeholder="Изберете дата"
            [(ngModel)]="medicalExaminationStartDate"
            [required]="isMedicalStartDateRequired"
            [error]="isMedicalStartDateRequired ? 'Задължително поле' : ''"
            (ngModelChange)="onMedicalStartDateChange()"
          ></app-date-picker>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Продължителност (месеци)
            @if (isMedicalDurationRequired) {
              <span class="text-red-600">*</span>
            }
          </label>
          <input
            type="number"
            min="1"
            class="w-full rounded-lg border px-3 py-2 text-sm"
            [class.border-gray-300]="!isMedicalDurationRequired"
            [class.border-red-300]="isMedicalDurationRequired"
            [class.bg-red-50]="isMedicalDurationRequired"
            [(ngModel)]="medicalExaminationDurationMonths"
            [required]="isMedicalDurationRequired"
            placeholder="Напр. 12"
            (ngModelChange)="onMedicalDurationChange()"
          />
        </div>
      </div>
      
      
      <div class="space-y-2">
        <h3 class="text-sm font-semibold text-gray-700">Застраховка (опционално)</h3>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Застраховка от
            @if (isInsuranceFromRequired) {
              <span class="text-red-600">*</span>
            }
          </label>
          <app-date-picker
            label=""
            placeholder="Изберете дата"
            [(ngModel)]="insuranceFrom"
            [required]="isInsuranceFromRequired"
            [error]="isInsuranceFromRequired ? 'Задължително поле' : ''"
            (ngModelChange)="onInsuranceFromChange()"
          ></app-date-picker>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Застраховка до
            @if (isInsuranceToRequired) {
              <span class="text-red-600">*</span>
            }
          </label>
          <app-date-picker
            label=""
            placeholder="Изберете дата"
            [(ngModel)]="insuranceTo"
            [required]="isInsuranceToRequired"
            [error]="isInsuranceToRequired ? 'Задължително поле' : ''"
            (ngModelChange)="onInsuranceToChange()"
          ></app-date-picker>
        </div>
      </div>
    </div>
    @if (error) {
      <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        {{ error }}
      </div>
    }
    <div class="flex justify-center gap-2 pt-4 border-t">
      <app-button
        variant="outline"
        size="md"
        text="Отказ"
        [disabled]="loading"
        (click)="close()">
      </app-button>
      <app-button
        variant="primary"
        size="md"
        [text]="loading ? 'Запазване...' : 'Приложи'"
        [disabled]="loading || uniqueCount === 0"
        (click)="submit()">
      </app-button>
    </div>
  </div>
</app-dialog>

<div class="bg-white rounded-lg border border-gray-200 p-5">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-semibold text-gray-900">Нишки (Thread Dump)</h3>
    <div class="flex items-center gap-2">
      <button
        *ngIf="loaded"
        type="button"
        class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-md transition-colors"
        (click)="refresh()"
        [disabled]="loading"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Initial load button -->
  <div *ngIf="!loaded && !loading && !error" class="text-center py-8">
    <p class="text-gray-500 text-sm mb-3">Thread dump е тежка операция и не се зарежда автоматично.</p>
    <button
      type="button"
      class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors"
      (click)="load()"
    >
      Зареди
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="flex items-center justify-center py-8">
    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
  </div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="text-center py-4">
    <p class="text-red-600 text-sm">{{ error }}</p>
  </div>

  <!-- Content -->
  <div *ngIf="loaded && !loading && !error" class="space-y-4">
    <!-- Summary -->
    <div class="flex flex-wrap items-center gap-2 pb-3 border-b border-gray-100">
      <span class="text-sm text-gray-600">Общо нишки:</span>
      <span class="text-sm font-semibold text-gray-900">{{ totalThreads }}</span>
      <span class="mx-1 text-gray-300">|</span>
      <span
        *ngFor="let sc of stateCounts"
        class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full"
        [ngClass]="getStateBadgeClass(sc.state)"
      >
        {{ sc.state }}: {{ sc.count }}
      </span>
    </div>

    <!-- Thread groups -->
    <div *ngFor="let group of threadGroups" class="border border-gray-100 rounded-md overflow-hidden">
      <button
        type="button"
        class="w-full flex items-center justify-between px-3 py-2 bg-gray-50 hover:bg-gray-100 transition-colors text-left"
        (click)="toggleGroup(group)"
      >
        <div class="flex items-center gap-2">
          <svg
            class="w-4 h-4 text-gray-400 transition-transform"
            [class.rotate-90]="group.expanded"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
          <span
            class="text-xs font-medium px-2 py-0.5 rounded-full"
            [ngClass]="getStateBadgeClass(group.state)"
          >
            {{ group.state }}
          </span>
          <span class="text-sm text-gray-600">({{ group.threads.length }})</span>
        </div>
      </button>

      <div *ngIf="group.expanded" class="divide-y divide-gray-50">
        <div *ngFor="let thread of group.threads" class="px-3 py-2">
          <button
            type="button"
            class="w-full flex items-center gap-2 text-left hover:bg-gray-50 rounded px-1 py-0.5"
            (click)="toggleThread(thread)"
          >
            <svg
              class="w-3 h-3 text-gray-400 transition-transform flex-shrink-0"
              [class.rotate-90]="thread.expanded"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
            <span class="text-sm text-gray-900 truncate">{{ thread.threadName }}</span>
            <span class="text-xs text-gray-400 flex-shrink-0">#{{ thread.threadId }}</span>
            <span
              class="text-xs font-medium px-1.5 py-0.5 rounded-full flex-shrink-0"
              [ngClass]="getStateBadgeClass(thread.threadState)"
            >
              {{ thread.threadState }}
            </span>
          </button>

          <div *ngIf="thread.expanded && thread.stackTrace.length > 0" class="mt-2 ml-5 p-2 bg-gray-50 rounded overflow-x-auto">
            <pre class="text-xs text-gray-500 font-mono leading-relaxed"><ng-container *ngFor="let line of getStackTraceLines(thread)">{{ line }}
</ng-container></pre>
          </div>

          <div *ngIf="thread.expanded && thread.stackTrace.length === 0" class="mt-2 ml-5">
            <span class="text-xs text-gray-400 italic">Няма stack trace</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

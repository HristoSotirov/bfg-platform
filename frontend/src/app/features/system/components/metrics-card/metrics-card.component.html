<div class="bg-white rounded-lg border border-gray-200 p-5">
  <div class="flex items-center justify-between mb-4">
    <h3 class="text-lg font-semibold text-gray-900">Метрики</h3>
    <button
      type="button"
      class="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-md transition-colors"
      (click)="refresh()"
      [disabled]="loading"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
        ></path>
      </svg>
    </button>
  </div>

  <div *ngIf="loading" class="flex items-center justify-center py-8">
    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="error && !loading" class="text-center py-4">
    <p class="text-red-600 text-sm">{{ error }}</p>
  </div>

  <div *ngIf="!loading && !error" class="space-y-5">
    <div *ngFor="let group of groups">
      <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">{{ group.title }}</h4>
      <div class="space-y-2">
        <div *ngFor="let metric of group.metrics" class="flex items-baseline justify-between py-1.5 px-3 rounded bg-gray-50">
          <span class="text-sm text-gray-600">{{ metric.label }}</span>
          <div class="text-right">
            <span class="text-sm font-semibold text-gray-900">{{ metric.value }}</span>
            <span *ngIf="metric.sublabel" class="block text-xs text-gray-400">{{ metric.sublabel }}</span>
          </div>
        </div>
      </div>
    </div>

    <div *ngIf="groups.length === 0" class="text-center py-4">
      <p class="text-gray-500 text-sm">Няма налични метрики</p>
    </div>
  </div>
</div>

<app-dialog [isOpen]="isOpen" [title]="'clubs.form.title' | translate" (closed)="close()">
  <div class="flex flex-col h-full min-h-0">
  <div class="space-y-4 flex-1 min-h-0 overflow-y-auto">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'clubs.form.nameLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="text"
        [(ngModel)]="formData.shortName"
        [placeholder]="'clubs.form.namePlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>


    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'clubs.form.fullNameLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="text"
        [(ngModel)]="formData.name"
        [placeholder]="'clubs.form.fullNamePlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>


    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'clubs.form.emailLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <input
        type="email"
        [(ngModel)]="formData.clubEmail"
        [placeholder]="'clubs.form.emailPlaceholder' | translate"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>


    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'clubs.form.typeLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="scopeTypeOptions"
        [placeholder]="'clubs.form.typePlaceholder' | translate"
        [ngModel]="formData.type"
        (ngModelChange)="formData.type = $event ?? ScopeType.Internal"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'clubs.form.adminLabel' | translate }} <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [serverSearch]="adminSearch"
        [valueHelpTitle]="'clubs.form.adminLabel' | translate"
        [valueHelpColumns]="adminValueHelpColumns"
        [valueHelpSearchFn]="adminValueHelpSearch"
        [valueHelpValueKey]="'uuid'"
        [valueHelpLabelKey]="'displayName'"
        [valueHelpDisabledFn]="isAdminDisabled"
        [placeholder]="'clubs.form.adminPlaceholder' | translate"
        [ngModel]="formData.clubAdminId"
        (ngModelChange)="onAdminSelectionChange($event)"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>


  </div>
  <div class="bg-white flex flex-col gap-2 pt-4 border-t border-gray-200">
      @if (error) {
        <div class="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg flex items-start justify-between gap-2">
          <p class="text-sm text-red-700">{{ error }}</p>
          <button type="button" class="text-red-400 hover:text-red-600 flex-shrink-0" (click)="error = null">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      }
      <div class="flex justify-center gap-3">
        <app-button
          variant="outline"
          size="md"
          [text]="'common.close' | translate"
          [disabled]="saving"
          (click)="close()">
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [text]="'common.save' | translate"
          [disabled]="!isFormValid || saving"
          (click)="save()">
        </app-button>
      </div>
    </div>
  </div>
</app-dialog>

<app-dialog [isOpen]="isOpen" title="Добавяне на нов клуб" (closed)="close()">
  <div class="space-y-4 flex-1 min-h-0 overflow-y-auto">
    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Име:</label>
      <input
        type="text"
        [(ngModel)]="formData.shortName"
        placeholder="Въведете име"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>

    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Пълно име:</label>
      <input
        type="text"
        [(ngModel)]="formData.name"
        placeholder="Въведете пълно име"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>

    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Имейл:</label>
      <input
        type="email"
        [(ngModel)]="formData.clubEmail"
        placeholder="Въведете имейл"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
    </div>

    
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Тип обхват <span class="text-red-500">*</span>:</label>
      <app-searchable-select-dropdown
        [options]="scopeTypeOptions"
        [placeholder]="'Изберете тип'"
        [ngModel]="formData.scopeType"
        (ngModelChange)="formData.scopeType = $event ?? ScopeType.Internal"
        [disabled]="saving">
      </app-searchable-select-dropdown>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Администратор:</label>
      @if (loadingAdmins) {
        <div class="text-sm text-gray-500">Зареждане...</div>
      } @else {
        <app-searchable-select-dropdown
          [options]="adminOptions"
          [placeholder]="'Изберете администратор'"
          [ngModel]="formData.clubAdminId"
          (ngModelChange)="onAdminSelectionChange($event)"
          [disabled]="saving">
        </app-searchable-select-dropdown>
      }
    </div>

    
    <div class="dialog-footer bg-white flex flex-col gap-2 mt-4 pt-4 border-t border-gray-200">
      @if (error) {
        <div class="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg">
          <p class="text-sm text-red-700">{{ error }}</p>
        </div>
      }
      <div class="flex justify-center gap-3">
        <app-button
          variant="outline"
          size="md"
          text="Затвори"
          [disabled]="saving"
          (click)="close()">
        </app-button>
        <app-button
          variant="primary"
          size="md"
          text="Запази"
          [disabled]="!isFormValid || saving"
          (click)="save()">
        </app-button>
      </div>
    </div>
  </div>
</app-dialog>

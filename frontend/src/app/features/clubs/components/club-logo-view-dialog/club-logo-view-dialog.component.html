<app-dialog
  [isOpen]="isOpen"
  [title]="'clubs.details.logo.altClubLogo' | translate"
  size="lg"
  [noScroll]="true"
  (closed)="close()"
>
  <div class="flex flex-col items-center gap-4">

    <div class="w-full max-w-sm aspect-square rounded-lg overflow-hidden border border-gray-200 bg-gray-100">
      <img
        [src]="logoUrl || 'assets/images/default-club.png'"
        [alt]="logoUrl ? ('clubs.details.logo.altClubLogo' | translate) : ('clubs.details.logo.altDefaultLogo' | translate)"
        class="w-full h-full object-contain"
      />
    </div>

    @if (clubInfo) {
      <div class="w-full text-center space-y-1 text-sm border-t border-gray-200 pt-4">
        <p class="font-medium text-gray-900">
          {{ clubInfo.shortName }}
        </p>
        <p class="text-gray-600">
          {{ clubInfo.name }}
        </p>
      </div>
    }
  </div>
</app-dialog>

<app-dialog [isOpen]="isOpen" [title]="'competitionGroups.form.title' | translate" size="xl" (closed)="close()">
  <div class="flex flex-col h-full min-h-0">
  <div class="space-y-4 flex-1 min-h-0 overflow-y-auto">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

      <!-- Left column: Basic info -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.nameLabel' | translate }} <span class="text-red-500">*</span>:</label>
          <input
            type="text"
            [(ngModel)]="formData.name"
            [placeholder]="'competitionGroups.form.namePlaceholder' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['name'] && !formData.name.trim()"
            (blur)="touched['name'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.shortNameLabel' | translate }} <span class="text-red-500">*</span>:</label>
          <input
            type="text"
            [(ngModel)]="formData.shortName"
            [placeholder]="'competitionGroups.form.shortNamePlaceholder' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['shortName'] && !formData.shortName.trim()"
            (blur)="touched['shortName'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.minAgeLabel' | translate }} <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.minAge"
            [placeholder]="'competitionGroups.form.minAgeLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['minAge'] && !formData.minAge && formData.minAge !== 0"
            (blur)="touched['minAge'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.maxAgeLabel' | translate }} <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.maxAge"
            [placeholder]="'competitionGroups.form.maxAgeLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['maxAge'] && !formData.maxAge && formData.maxAge !== 0"
            (blur)="touched['maxAge'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.maxDisciplinesLabel' | translate }} <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.maxDisciplinesPerAthlete"
            [placeholder]="'competitionGroups.form.maxDisciplinesLabel' | translate"
            min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.statusLabel' | translate }} <span class="text-red-500">*</span>:</label>
          <app-searchable-select-dropdown
            [options]="statusOptions"
            [placeholder]="'competitionGroups.placeholders.selectStatus' | translate"
            [ngModel]="formData.isActive ? 'true' : 'false'"
            (ngModelChange)="onStatusChange($event)"
            [disabled]="saving">
          </app-searchable-select-dropdown>
        </div>
      </div>

      <!-- Right column: Transfer & Weight info -->
      <div class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.transferFromGroupLabel' | translate }}:</label>
          <app-searchable-select-dropdown
            [staticSearch]="groupSearch"
            [(ngModel)]="formData.transferFromGroupId"
            [placeholder]="'competitionGroups.placeholders.selectGroup' | translate"
          ></app-searchable-select-dropdown>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.minCrewForTransferLabel' | translate }}:</label>
          <input
            type="number"
            [(ngModel)]="formData.minCrewForTransfer"
            [placeholder]="'competitionGroups.form.minCrewForTransferLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.transferRatioLabel' | translate }}:</label>
          <input
            type="number"
            step="0.01"
            [(ngModel)]="formData.transferRatio"
            [placeholder]="'competitionGroups.form.transferRatioLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.transferRoundingLabel' | translate }}:</label>
          <app-searchable-select-dropdown
            [options]="roundingOptions"
            [placeholder]="'competitionGroups.placeholders.selectRounding' | translate"
            [ngModel]="formData.transferRounding"
            (ngModelChange)="onRoundingChange($event)"
            [disabled]="saving">
          </app-searchable-select-dropdown>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.transferredMaxDisciplinesLabel' | translate }}:</label>
          <input
            type="number"
            [(ngModel)]="formData.transferredMaxDisciplinesPerAthlete"
            [placeholder]="'competitionGroups.form.maxDisciplinesLabel' | translate"
            min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.coxMinAgeLabel' | translate }}:</label>
          <input
            type="number"
            [(ngModel)]="formData.coxMinAge"
            [placeholder]="'competitionGroups.form.minAgeLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.coxMaxAgeLabel' | translate }}:</label>
          <input
            type="number"
            [(ngModel)]="formData.coxMaxAge"
            [placeholder]="'competitionGroups.form.minAgeLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate }}:</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.maleTeamLightMaxWeightKg"
            [placeholder]="'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.maleTeamCoxMinWeightLabel' | translate }}:</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.maleTeamCoxMinWeightKg"
            [placeholder]="'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.maleTeamCoxRequiredWeightLabel' | translate }}:</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.maleTeamCoxRequiredWeightKg"
            [placeholder]="'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.femaleTeamLightMaxWeightLabel' | translate }}:</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.femaleTeamLightMaxWeightKg"
            [placeholder]="'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.femaleTeamCoxMinWeightLabel' | translate }}:</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.femaleTeamCoxMinWeightKg"
            [placeholder]="'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">{{ 'competitionGroups.form.femaleTeamCoxRequiredWeightLabel' | translate }}:</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.femaleTeamCoxRequiredWeightKg"
            [placeholder]="'competitionGroups.form.maleTeamLightMaxWeightLabel' | translate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="bg-white flex flex-col gap-2 pt-4 border-t border-gray-200">
      @if (error) {
        <div class="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg flex items-start justify-between gap-2">
          <p class="text-sm text-red-700">{{ error }}</p>
          <button type="button" class="text-red-400 hover:text-red-600 flex-shrink-0" (click)="error = null">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      }
      <div class="flex justify-center gap-3">
        <app-button
          variant="outline"
          size="md"
          [text]="'common.close' | translate"
          [disabled]="saving"
          (click)="close()">
        </app-button>
        <app-button
          variant="primary"
          size="md"
          [text]="'common.save' | translate"
          [disabled]="!isFormValid || saving"
          (click)="save()">
        </app-button>
      </div>
    </div>
  </div>
</app-dialog>

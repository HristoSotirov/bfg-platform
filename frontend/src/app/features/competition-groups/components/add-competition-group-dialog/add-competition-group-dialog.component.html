<app-dialog [isOpen]="isOpen" title="Добавяне на състезателна група" size="xl" (closed)="close()">
  <div class="flex flex-col h-full min-h-0">
  <div class="space-y-4 flex-1 min-h-0 overflow-y-auto">

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

      <!-- Left column: Basic info -->
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Име <span class="text-red-500">*</span>:</label>
          <input
            type="text"
            [(ngModel)]="formData.name"
            placeholder="Въведете име"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['name'] && !formData.name.trim()"
            (blur)="touched['name'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Кратко име <span class="text-red-500">*</span>:</label>
          <input
            type="text"
            [(ngModel)]="formData.shortName"
            placeholder="Въведете кратко име"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['shortName'] && !formData.shortName.trim()"
            (blur)="touched['shortName'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Мин. възраст <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.minAge"
            placeholder="Въведете мин. възраст"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['minAge'] && !formData.minAge && formData.minAge !== 0"
            (blur)="touched['minAge'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Макс. възраст <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.maxAge"
            placeholder="Въведете макс. възраст"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue"
            [class.border-red-500]="touched['maxAge'] && !formData.maxAge && formData.maxAge !== 0"
            (blur)="touched['maxAge'] = true">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Макс. дисциплини <span class="text-red-500">*</span>:</label>
          <input
            type="number"
            [(ngModel)]="formData.maxDisciplinesPerAthlete"
            placeholder="Въведете макс. дисциплини"
            min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Статус <span class="text-red-500">*</span>:</label>
          <app-searchable-select-dropdown
            [options]="statusOptions"
            [placeholder]="'Изберете статус'"
            [ngModel]="formData.isActive ? 'true' : 'false'"
            (ngModelChange)="onStatusChange($event)"
            [disabled]="saving">
          </app-searchable-select-dropdown>
        </div>
      </div>

      <!-- Right column: Transfer & Weight info -->
      <div class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Група за трансфер:</label>
          <app-searchable-select-dropdown
            [staticSearch]="groupSearch"
            [(ngModel)]="formData.transferFromGroupId"
            placeholder="Изберете група..."
          ></app-searchable-select-dropdown>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Мин. екипаж за трансфер:</label>
          <input
            type="number"
            [(ngModel)]="formData.minCrewForTransfer"
            placeholder="Въведете мин. екипаж"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Коефициент на трансфер:</label>
          <input
            type="number"
            step="0.01"
            [(ngModel)]="formData.transferRatio"
            placeholder="Въведете коефициент"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Закръгляне:</label>
          <app-searchable-select-dropdown
            [options]="roundingOptions"
            [placeholder]="'Изберете закръгляне'"
            [ngModel]="formData.transferRounding"
            (ngModelChange)="onRoundingChange($event)"
            [disabled]="saving">
          </app-searchable-select-dropdown>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Макс. дисц. (трансф.):</label>
          <input
            type="number"
            [(ngModel)]="formData.transferredMaxDisciplinesPerAthlete"
            placeholder="Въведете макс. дисциплини"
            min="1"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Рулеви мин. възраст:</label>
          <input
            type="number"
            [(ngModel)]="formData.coxMinAge"
            placeholder="Въведете възраст"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Рулеви макс. възраст:</label>
          <input
            type="number"
            [(ngModel)]="formData.coxMaxAge"
            placeholder="Въведете възраст"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Мъжки отбор - Лек макс. тегло (кг):</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.maleTeamLightMaxWeightKg"
            placeholder="Въведете тегло"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Мъжки отбор - Рулеви мин. тегло (кг):</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.maleTeamCoxMinWeightKg"
            placeholder="Въведете тегло"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Мъжки отбор - Рулеви изискв. тегло (кг):</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.maleTeamCoxRequiredWeightKg"
            placeholder="Въведете тегло"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Женски отбор - Лек макс. тегло (кг):</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.femaleTeamLightMaxWeightKg"
            placeholder="Въведете тегло"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Женски отбор - Рулеви мин. тегло (кг):</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.femaleTeamCoxMinWeightKg"
            placeholder="Въведете тегло"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Женски отбор - Рулеви изискв. тегло (кг):</label>
          <input
            type="number"
            step="0.1"
            [(ngModel)]="formData.femaleTeamCoxRequiredWeightKg"
            placeholder="Въведете тегло"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-bfg-blue focus:border-bfg-blue">
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="bg-white flex flex-col gap-2 pt-4 border-t border-gray-200">
      @if (error) {
        <div class="w-full px-3 py-2 bg-red-50 border border-red-200 rounded-lg flex items-start justify-between gap-2">
          <p class="text-sm text-red-700">{{ error }}</p>
          <button type="button" class="text-red-400 hover:text-red-600 flex-shrink-0" (click)="error = null">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      }
      <div class="flex justify-center gap-3">
        <app-button
          variant="outline"
          size="md"
          text="Затвори"
          [disabled]="saving"
          (click)="close()">
        </app-button>
        <app-button
          variant="primary"
          size="md"
          text="Запази"
          [disabled]="!isFormValid || saving"
          (click)="save()">
        </app-button>
      </div>
    </div>
  </div>
</app-dialog>

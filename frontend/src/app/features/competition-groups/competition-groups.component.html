<div class="h-screen flex flex-col overflow-hidden bg-white">
  <app-header></app-header>

  <div class="flex-1 flex flex-col overflow-hidden px-4 lg:px-8 py-4">
    <div class="flex items-center gap-3 mb-4">
      <a
        routerLink="/"
        class="p-2 hover:bg-gray-100 rounded-lg transition-colors"
      >
        <svg
          class="w-5 h-5 text-gray-600"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 19l-7-7 7-7"
          ></path>
        </svg>
      </a>
      <h1 class="text-2xl font-bold text-gray-900">{{ 'competitionGroups.title' | translate }}</h1>
    </div>

    <app-competition-groups-filters
      [filters]="filters"
      [filterConfigs]="filterConfigs"
      (filtersChange)="onFiltersChange($event)"
      (searchChange)="onSearchChange($event)"
    >
    </app-competition-groups-filters>

    <div class="flex items-center justify-between gap-4 mb-4">
      <div class="text-sm text-gray-600 flex-shrink-0">
        {{ 'competitionGroups.count' | translate }} <span class="font-semibold">{{ totalElements }}</span>
      </div>

      <div class="flex items-center gap-2 ml-auto">
        @if (canAdd) {
          <app-button
            variant="white"
            size="md"
            [text]="'competitionGroups.addButton' | translate"
            (click)="openAddDialog()"
          >
          </app-button>
        }

        <div class="relative group flex-shrink-0">
          <button
            type="button"
            class="p-2 text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors"
            (click)="openSettingsDialog()"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
          </button>
          <div
            class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-3 py-1.5 bg-white text-gray-900 text-xs rounded-full whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-50 shadow-lg border border-gray-200"
          >
            {{ 'common.settings' | translate }}
          </div>
        </div>
      </div>
    </div>

    <div
      class="flex-1 overflow-hidden bg-white rounded-lg border border-gray-200"
    >
      @if (loading && groups.length === 0) {
        <div class="flex items-center justify-center h-full">
          <div class="text-gray-500">{{ 'common.loading' | translate }}</div>
        </div>
      } @else if (error) {
        <div class="flex items-center justify-center h-full">
          <div class="text-red-500">{{ error }}</div>
        </div>
      } @else {
        <app-competition-groups-table
          [groups]="groups"
          [columns]="columns"
          [groupLookup]="groupLookup"
          [loading]="loading"
          [hasMore]="hasMore"
          [orderBy]="orderBy"
          (rowClick)="openDetailsDialog($event)"
          (sortChange)="onSortChange($event)"
          (loadMore)="loadMore()"
        >
        </app-competition-groups-table>
      }
    </div>
  </div>
</div>

<app-competition-group-details-dialog
  [isOpen]="isDetailsDialogOpen"
  [group]="selectedGroup"
  [canEdit]="canEdit"
  [groupMap]="groupLookup"
  (closed)="closeDetailsDialog()"
  (navigated)="closeDetailsDialog()"
  (saved)="onGroupSaved()"
  (deleted)="onGroupDeleted()"
>
</app-competition-group-details-dialog>

<app-add-competition-group-dialog
  [isOpen]="isAddDialogOpen"
  (closed)="closeAddDialog()"
  (added)="onGroupAdded()"
>
</app-add-competition-group-dialog>

<app-competition-groups-settings-dialog
  [isOpen]="isSettingsDialogOpen"
  [columns]="columns"
  [filterConfigs]="filterConfigs"
  (closed)="closeSettingsDialog()"
  (settingsChange)="onSettingsChange($event)"
>
</app-competition-groups-settings-dialog>

<div
  class="h-screen bg-white flex flex-col lg:flex-row overflow-hidden relative"
>
  <div
    class="hidden lg:block absolute top-[15vh] bottom-[15vh] left-1/2 border-l border-gray-300"
  ></div>

  <div
    class="w-full lg:w-1/2 flex flex-col items-center justify-center px-6 lg:px-20 h-full"
  >
    <img
      src="assets/images/logo-no-text.png"
      alt="Logo"
      class="lg:hidden w-44 h-44 object-contain mb-6"
    />

    <h1
      class="text-3xl lg:text-[34px] font-bold text-black mb-10 lg:mb-14 text-center leading-tight"
    >
      {{ 'auth.login.title1' | translate }}<br />{{ 'auth.login.title2' | translate }}
    </h1>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="w-full max-w-md space-y-6"
      autocomplete="off"
    >
      <div class="flex justify-center mb-2">
        <div class="inline-flex items-center gap-1 rounded-full bg-gray-100 p-1">
          <button
            type="button"
            class="flex items-center gap-1.5 px-3 py-1 rounded-full text-sm transition-colors"
            [class.bg-white]="currentLanguage === 'bg'"
            [class.shadow-sm]="currentLanguage === 'bg'"
            [class.text-gray-900]="currentLanguage === 'bg'"
            [class.font-medium]="currentLanguage === 'bg'"
            [class.text-gray-500]="currentLanguage !== 'bg'"
            (click)="switchLanguage('bg')"
          >
            <span class="text-base leading-none">🇧🇬</span>
            <span>BG</span>
          </button>
          <button
            type="button"
            class="flex items-center gap-1.5 px-3 py-1 rounded-full text-sm transition-colors"
            [class.bg-white]="currentLanguage === 'en'"
            [class.shadow-sm]="currentLanguage === 'en'"
            [class.text-gray-900]="currentLanguage === 'en'"
            [class.font-medium]="currentLanguage === 'en'"
            [class.text-gray-500]="currentLanguage !== 'en'"
            (click)="switchLanguage('en')"
          >
            <span class="text-base leading-none">🇺🇸</span>
            <span>EN</span>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >{{ 'auth.login.username' | translate }}</label
        >
        <input
          type="text"
          formControlName="username"
          [placeholder]="'auth.login.usernamePlaceholder' | translate"
          autocomplete="username"
          class="w-full px-4 py-3 text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-bfg-blue focus:border-transparent"
          [class.border-red-500]="
            loginForm.get('username')?.invalid &&
            loginForm.get('username')?.touched
          "
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2"
          >{{ 'auth.login.password' | translate }}</label
        >
        <input
          type="password"
          formControlName="password"
          [placeholder]="'auth.login.passwordPlaceholder' | translate"
          autocomplete="current-password"
          class="w-full px-4 py-3 text-base border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-bfg-blue focus:border-transparent"
          [class.border-red-500]="
            loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched
          "
        />
        <div class="text-right mt-1">
          <button type="button" class="text-sm text-bfg-blue hover:underline" (click)="openForgotPassword()">
            {{ 'auth.login.forgotPassword' | translate }}
          </button>
        </div>
      </div>

      <div *ngIf="error" class="text-red-600 text-sm p-2 bg-red-50 rounded flex items-center justify-between">
        <span>{{ error }}</span>
        <button type="button" class="text-red-400 hover:text-red-600 flex-shrink-0 ml-2" (click)="error = ''">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div class="flex flex-col gap-3 pt-4">
        <app-button
          type="submit"
          variant="primary"
          size="lg"
          [fullWidth]="true"
          [disabled]="loginForm.invalid"
          [text]="'auth.login.submit' | translate"
        >
        </app-button>
        <app-button
          type="button"
          variant="secondary"
          size="lg"
          [fullWidth]="true"
          [text]="'auth.login.guestLogin' | translate"
          (click)="continueAsGuest()"
        >
        </app-button>
      </div>
    </form>
  </div>

  <div class="hidden lg:flex lg:w-1/2 items-center justify-center bg-white">
    <img
      src="assets/images/logo-with-text.png"
      alt="Bulgarian Rowing Federation Logo"
      class="max-h-[80vh] object-contain"
    />
  </div>
</div>

<app-forgot-password-dialog
  [isOpen]="isForgotPasswordOpen"
  (closed)="closeForgotPassword()">
</app-forgot-password-dialog>

<app-reset-password-dialog
  [isOpen]="isResetPasswordOpen"
  [token]="resetToken"
  (closed)="closeResetPassword()"
  (resetSuccess)="closeResetPassword()">
</app-reset-password-dialog>
